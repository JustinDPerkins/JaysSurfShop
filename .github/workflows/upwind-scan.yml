name: Upwind Manual Image Scan

# Manual SCA scan via Upwind Shift Left actions.
# Requires GitHub secrets: UPWIND_CLIENT_ID, UPWIND_CLIENT_SECRET, AWS_DEPLOY_ROLE_ARN

on:
  workflow_dispatch:
    inputs:
      service:
        description: Service to scan
        type: choice
        options:
          - all
          - frontend
          - chat-rag
          - board-generator
        default: all
      image_tag:
        description: Image tag (ECR mode) or local tag suffix (build mode)
        type: string
        default: latest
      scan_mode:
        description: Pull from ECR or build from Dockerfile on the runner
        type: choice
        options:
          - ecr
          - build
        default: ecr

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: jays-surf-shop
  ENVIRONMENT: demo

permissions:
  id-token: write
  contents: read

jobs:
  scan:
    name: Scan ${{ matrix.service }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(
          inputs.service == 'all'
          && '["frontend","chat-rag","board-generator"]'
          || format('["{0}"]', inputs.service)
          ) }}
    steps:
      - name: Check Upwind credentials
        env:
          UPWIND_CLIENT_ID: ${{ secrets.UPWIND_CLIENT_ID }}
          UPWIND_CLIENT_SECRET: ${{ secrets.UPWIND_CLIENT_SECRET }}
        run: |
          if [ -z "$UPWIND_CLIENT_ID" ] || [ -z "$UPWIND_CLIENT_SECRET" ]; then
            echo "::error::Add UPWIND_CLIENT_ID and UPWIND_CLIENT_SECRET to this repo's Actions secrets."
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Resolve build context
        id: ctx
        run: |
          case "${{ matrix.service }}" in
            frontend)         echo "context=frontend" ;;
            chat-rag)         echo "context=services/chat-rag" ;;
            board-generator)  echo "context=services/board-generator" ;;
          esac >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        if: inputs.scan_mode == 'ecr'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: inputs.scan_mode == 'ecr'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: true

      - name: Set image reference
        id: image
        run: |
          if [ "${{ inputs.scan_mode }}" = "ecr" ]; then
            IMAGE="${{ steps.login-ecr.outputs.registry }}/${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}/${{ matrix.service }}:${{ inputs.image_tag }}"
          else
            IMAGE="${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-${{ matrix.service }}:${{ inputs.image_tag }}"
          fi
          echo "ref=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "Scan target: ${IMAGE}"

      - name: Pull image from ECR
        if: inputs.scan_mode == 'ecr'
        run: docker pull "${{ steps.image.outputs.ref }}"

      - name: Build image locally
        if: inputs.scan_mode == 'build'
        run: docker build -t "${{ steps.image.outputs.ref }}" "./${{ steps.ctx.outputs.context }}"

      - name: Shift Left Image Scan
        uses: upwindsecurity/shiftleft-create-image-scan-event-action@main
        with:
          upwind_client_id: ${{ secrets.UPWIND_CLIENT_ID }}
          upwind_client_secret: ${{ secrets.UPWIND_CLIENT_SECRET }}
          docker_image: ${{ steps.image.outputs.ref }}
          pull_image: false
          commit_sha: ${{ github.sha }}

      - name: Shift Left Image Publish
        if: inputs.scan_mode == 'ecr'
        uses: upwindsecurity/shiftleft-create-image-publish-event-action@main
        with:
          upwind_client_id: ${{ secrets.UPWIND_CLIENT_ID }}
          upwind_client_secret: ${{ secrets.UPWIND_CLIENT_SECRET }}
          docker_image: ${{ steps.image.outputs.ref }}
          pull_image: false
