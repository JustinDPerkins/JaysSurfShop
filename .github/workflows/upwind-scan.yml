name: Upwind Scan

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  scan:
    name: Scan ${{ matrix.service }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: frontend
            context: frontend
          - service: chat-rag
            context: services/chat-rag
          - service: board-generator
            context: services/board-generator
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t jays-surf-shop-demo/${{ matrix.service }}:${{ github.sha }} ./${{ matrix.context }}

      - name: Upwind ShiftLeft Scan
        uses: upwindsecurity/shiftleft-create-image-scan-event-action@main
        with:
          upwind_client_id: ${{ secrets.UPWIND_CLIENT_ID }}
          upwind_client_secret: ${{ secrets.UPWIND_CLIENT_SECRET }}
          docker_image: jays-surf-shop-demo/${{ matrix.service }}:${{ github.sha }}
          pull_image: false
