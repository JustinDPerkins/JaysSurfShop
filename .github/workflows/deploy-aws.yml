name: Build, Push, and Scan

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: jays-surf-shop
  ENVIRONMENT: demo

permissions:
  id-token: write
  contents: read
  actions: read

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: true

      - name: Build and push images
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          chmod +x infrastructure/scripts/build-push.sh
          ./infrastructure/scripts/build-push.sh

      - name: Upwind ShiftLeft Scan — frontend
        uses: upwindsecurity/shiftleft-create-image-scan-event-action@main
        continue-on-error: true
        with:
          upwind_client_id: ${{ secrets.UPWIND_CLIENT_ID }}
          upwind_client_secret: ${{ secrets.UPWIND_CLIENT_SECRET }}
          docker_image: ${{ steps.login-ecr.outputs.registry }}/${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}/frontend:${{ github.sha }}
          pull_image: false

      - name: Upwind ShiftLeft Scan — chat-rag
        uses: upwindsecurity/shiftleft-create-image-scan-event-action@main
        continue-on-error: true
        with:
          upwind_client_id: ${{ secrets.UPWIND_CLIENT_ID }}
          upwind_client_secret: ${{ secrets.UPWIND_CLIENT_SECRET }}
          docker_image: ${{ steps.login-ecr.outputs.registry }}/${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}/chat-rag:${{ github.sha }}
          pull_image: false

      - name: Upwind ShiftLeft Scan — board-generator
        uses: upwindsecurity/shiftleft-create-image-scan-event-action@main
        continue-on-error: true
        with:
          upwind_client_id: ${{ secrets.UPWIND_CLIENT_ID }}
          upwind_client_secret: ${{ secrets.UPWIND_CLIENT_SECRET }}
          docker_image: ${{ steps.login-ecr.outputs.registry }}/${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}/board-generator:${{ github.sha }}
          pull_image: false

