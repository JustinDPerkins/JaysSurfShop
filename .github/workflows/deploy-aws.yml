name: Build and Scan

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_PREFIX: jays-surf-shop-demo

permissions:
  contents: read

jobs:
  build-and-scan:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Build container images
        run: |
          TAG="${{ github.sha }}"
          docker build -t "${{ env.IMAGE_PREFIX }}/frontend:${TAG}" ./frontend
          docker build -t "${{ env.IMAGE_PREFIX }}/chat-rag:${TAG}" ./services/chat-rag
          docker build -t "${{ env.IMAGE_PREFIX }}/board-generator:${TAG}" ./services/board-generator

      - name: Upwind ShiftLeft Scan — frontend
        uses: upwindsecurity/shiftleft-create-image-scan-event-action@main
        continue-on-error: true
        with:
          upwind_client_id: ${{ secrets.UPWIND_CLIENT_ID }}
          upwind_client_secret: ${{ secrets.UPWIND_CLIENT_SECRET }}
          docker_image: ${{ env.IMAGE_PREFIX }}/frontend:${{ github.sha }}
          pull_image: false

      - name: Upwind ShiftLeft Scan — chat-rag
        uses: upwindsecurity/shiftleft-create-image-scan-event-action@main
        continue-on-error: true
        with:
          upwind_client_id: ${{ secrets.UPWIND_CLIENT_ID }}
          upwind_client_secret: ${{ secrets.UPWIND_CLIENT_SECRET }}
          docker_image: ${{ env.IMAGE_PREFIX }}/chat-rag:${{ github.sha }}
          pull_image: false

      - name: Upwind ShiftLeft Scan — board-generator
        uses: upwindsecurity/shiftleft-create-image-scan-event-action@main
        continue-on-error: true
        with:
          upwind_client_id: ${{ secrets.UPWIND_CLIENT_ID }}
          upwind_client_secret: ${{ secrets.UPWIND_CLIENT_SECRET }}
          docker_image: ${{ env.IMAGE_PREFIX }}/board-generator:${{ github.sha }}
          pull_image: false

