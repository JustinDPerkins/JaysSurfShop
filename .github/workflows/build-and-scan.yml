name: Build and Scan

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  scan:
    name: ${{ matrix.service }}
    runs-on: ubuntu-24.04
    env:
      UPWIND_CLIENT_ID: ${{ secrets.UPWIND_CLIENT_ID }}
      UPWIND_CLIENT_SECRET: ${{ secrets.UPWIND_CLIENT_SECRET }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: frontend
            context: frontend
          - service: chat-rag
            context: services/chat-rag
          - service: board-generator
            context: services/board-generator
    steps:
      - uses: actions/checkout@v4

      - name: Check Upwind credentials
        run: |
          if [ -z "$UPWIND_CLIENT_ID" ] || [ -z "$UPWIND_CLIENT_SECRET" ]; then
            echo "::error::Missing GitHub Actions secrets."
            echo "Add UPWIND_CLIENT_ID and UPWIND_CLIENT_SECRET at:"
            echo "https://github.com/${{ github.repository }}/settings/secrets/actions"
            echo ""
            echo "Create credentials in Upwind Console → Organization → Credentials."
            exit 1
          fi

      - name: Build image
        run: |
          docker build \
            -t jays-surf-shop/${{ matrix.service }}:${{ github.sha }} \
            "./${{ matrix.context }}"

      - name: Upwind ShiftLeft Scan
        uses: upwindsecurity/shiftleft-create-image-scan-event-action@main
        with:
          upwind_client_id: ${{ env.UPWIND_CLIENT_ID }}
          upwind_client_secret: ${{ env.UPWIND_CLIENT_SECRET }}
          docker_image: jays-surf-shop/${{ matrix.service }}:${{ github.sha }}
          pull_image: false
