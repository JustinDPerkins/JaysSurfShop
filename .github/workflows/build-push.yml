name: Build and Push Images

# Builds from repo Dockerfiles, pushes to ECR.
# Upwind GitHub App detects registry push → dispatches shiftleft-automated scan.

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: jays-surf-shop
  ENVIRONMENT: demo

permissions:
  id-token: write
  contents: read

jobs:
  build-push:
    name: Push ${{ matrix.service }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: frontend
            context: frontend
          - service: chat-rag
            context: services/chat-rag
          - service: board-generator
            context: services/board-generator
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: true

      - name: Build and push
        env:
          IMAGE: ${{ steps.login-ecr.outputs.registry }}/${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}/${{ matrix.service }}:${{ github.sha }}
        run: |
          docker build -t "$IMAGE" \
            -t "${{ steps.login-ecr.outputs.registry }}/${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}/${{ matrix.service }}:latest" \
            "./${{ matrix.context }}"
          docker push "$IMAGE"
          docker push "${{ steps.login-ecr.outputs.registry }}/${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}/${{ matrix.service }}:latest"
