name: Build and Push Images

# Upwind GitHub App watches workflow jobs. When images are pushed to GHCR,
# it dispatches scan-image.yaml in shiftleft-automated.

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: Push ${{ matrix.service }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: frontend
            context: frontend
          - service: chat-rag
            context: services/chat-rag
          - service: board-generator
            context: services/board-generator
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/jays-surf-shop-${{ matrix.service }}:${{ github.sha }}
        run: |
          docker build -t "$IMAGE" \
            -t "ghcr.io/${{ github.repository_owner }}/jays-surf-shop-${{ matrix.service }}:latest" \
            "./${{ matrix.context }}"
          docker push "$IMAGE"
          docker push "ghcr.io/${{ github.repository_owner }}/jays-surf-shop-${{ matrix.service }}:latest"
